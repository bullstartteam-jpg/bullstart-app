name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      # Don't let a mac failure cancel the Windows build.
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: --win
            optional: false
          - os: macos-latest
            target: --mac
            optional: true   # no Apple signing configured → tolerate failure
    runs-on: ${{ matrix.os }}
    # The mac job is best-effort: its failure won't mark the run as failed.
    continue-on-error: ${{ matrix.optional }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Build + publish installer
        run: npx electron-builder ${{ matrix.target }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
